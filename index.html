<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazel Studio</title>
    <style>
        :root { --accent: #ff9f43; --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authBox" class="card">
    <h2 style="text-align:center;">Hazel Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="window.authAction()">Login</button>
</div>

<div id="studioBox" class="hidden">
    <div class="card">
        <h3>Publish Novel</h3>
        <input type="text" id="nTitle" placeholder="Novel Title">
        <input type="number" id="nChNo" placeholder="Chapter Number">
        <textarea id="nContent" rows="8" placeholder="Content..."></textarea>
        <button id="pubBtn" onclick="window.publish()">Publish Now</button>
    </div>
    <div id="list"></div>
    <button onclick="window.logout()" style="background:#444; color:white; margin-top:10px;">Logout</button>
</div>

<script type="module">
    // Firebase version ကို 10.7.1 (ပိုတည်ငြိမ်တဲ့ version) ကို ပြောင်းသုံးထားပါတယ်
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, arrayUnion, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIt93W3hXXHu30cMFm47pXj9Dm0UG5IgA",
        authDomain: "hazelnovel-web.firebaseapp.com",
        projectId: "hazelnovel-web",
        storageBucket: "hazelnovel-web.appspot.com",
        messagingSenderId: "516666865374",
        appId: "1:516666865374:web:e89a3906e27143cf53744f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    window.authAction = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        try {
            await signInWithEmailAndPassword(auth, e, p);
        } catch {
            try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert("Auth Error: " + err.message); }
        }
    };

    onAuthStateChanged(auth, (u) => {
        if(u) {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('studioBox').classList.remove('hidden');
            load();
        }
    });

    window.publish = async () => {
        const t = document.getElementById('nTitle').value.trim();
        const c = document.getElementById('nChNo').value;
        const con = document.getElementById('nContent').value;
        if(!t || !con) return alert("အချက်အလက်ဖြည့်ပါ");

        const btn = document.getElementById('pubBtn');
        btn.innerText = "Publishing...";
        btn.disabled = true;

        try {
            // Firestore ထဲ စာရေးတဲ့အခါ Error တက်ရင် Alert ပြအောင် လုပ်ထားပါတယ်
            const ref = doc(db, "novels", t);
            const snap = await getDoc(ref);
            const entry = { ch: Number(c), content: con, time: Date.now() };
            
            if(snap.exists()) {
                await updateDoc(ref, { chapters: arrayUnion(entry) });
            } else {
                await setDoc(ref, { title: t, chapters: [entry], author: auth.currentUser.uid });
            }
            alert("အောင်မြင်စွာ တင်ပြီးပါပြီ!"); 
            location.reload();
        } catch(e) { 
            console.error(e);
            alert("စာတင်မရရခြင်း အကြောင်းရင်း: " + e.message); 
            btn.innerText = "Publish Now";
            btn.disabled = false;
        }
    };

    async function load() {
        try {
            const snap = await getDocs(collection(db, "novels"));
            const l = document.getElementById('list');
            l.innerHTML = "<h4>Your Novels</h4>";
            snap.forEach(d => {
                l.innerHTML += `<div class="card">${d.data().title}</div>`;
            });
        } catch(e) { console.log(e); }
    }

    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
