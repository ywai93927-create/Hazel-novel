<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazel Novel - Studio</title>
    <style>
        :root { --accent: #ff9f43; --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        
        /* Elements */
        .card { background: var(--card); padding: 25px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #222; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        
        /* Header & Nav */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; }
        .logo { background: linear-gradient(135deg, #ff9f43, #ff6b6b); color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #222; color: #888; border-radius: 8px; border: none; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* List Styling */
        .novel-item { display: flex; align-items: center; background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .novel-item img { width: 50px; height: 70px; object-fit: cover; border-radius: 6px; margin-right: 15px; background: #333; }
        .status-msg { text-align: center; color: var(--accent); font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo" onclick="location.reload()">H</div>
        <div id="userMenu" class="hidden">
            <button onclick="window.showProfile()" style="width: auto; padding: 8px 15px; background: #222; color: var(--accent);">👤 Profile</button>
        </div>
    </div>

    <div id="authSection" class="card">
        <h2 style="text-align:center; margin-top: 0;">Hazel Login</h2>
        <p style="color: #888; text-align: center; font-size: 14px;">အကောင့်ရှိလျှင် Login ဝင်ပါ။ မရှိလျှင် Email နှင့် Password ရိုက်ပြီး နှိပ်လိုက်ပါ၊ အလိုလိုဖွင့်ပေးပါမည်။</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password (အနည်းဆုံး ၆ လုံး)">
        <button id="authBtn" onclick="window.authAction()">Login / Sign Up</button>
    </div>

    <div id="mainSection" class="hidden">
        <h3 style="border-left: 4px solid var(--accent); padding-left: 10px;">Recent Updates</h3>
        <div id="novelList"></div>
    </div>

    <div id="profileSection" class="hidden">
        <div class="nav-tabs">
            <button id="tabStudio" class="tab-btn active" onclick="window.switchTab('studio')">My Studio</button>
            <button id="tabSetting" class="tab-btn" onclick="window.switchTab('setting')">Settings</button>
        </div>
        
        <div id="studioTab">
            <button onclick="window.showAdmin()" style="margin-bottom: 20px;">+ Create New Novel</button>
            <div id="myNovels"></div>
        </div>

        <div id="settingTab" class="hidden">
            <div class="card" style="text-align: center;">
                <p id="userEmailDisp"></p>
                <button onclick="window.logout()" style="background:#ff4757; color:white;">Logout</button>
            </div>
        </div>
    </div>

    <div id="adminArea" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="window.showProfile()" style="background:none; color:var(--accent); width: auto; padding: 0;">❮ Back</button>
            <h3 style="margin: 0;">New Novel</h3>
        </div>
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <input type="text" id="nTitle" placeholder="Novel Title (နာမည်)">
        <label style="font-size: 12px; color: #888;">Cover Photo (Optional):</label>
        <input type="file" id="nCover" accept="image/*">
        <input type="number" id="nChNo" placeholder="Chapter Number (e.g. 1)">
        <textarea id="nContent" rows="10" placeholder="Write your story here..."></textarea>
        <button id="publishBtn" onclick="window.uploadNovel()">Publish Now</button>
        <div id="uploadStatus" class="status-msg"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, arrayUnion, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // --- Firebase Configuration (Verified from your image) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBIt93W3hXXHu30cMFm47pXj9Dm0UG5IgA",
        authDomain: "hazelnovel-web.firebaseapp.com",
        projectId: "hazelnovel-web",
        storageBucket: "hazelnovel-web.firebasestorage.app",
        messagingSenderId: "516666865374",
        appId: "1:516666865374:web:e89a3906e27143cf53744f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    // Auth Action
    window.authAction = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('authBtn');
        if(!email || !pass) return alert("Email နှင့် Password ဖြည့်ပါ");
        
        btn.disabled = true; btn.innerText = "Processing...";
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch(e) {
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
            } catch(err) { alert("Error: " + err.message); }
        }
        btn.disabled = false; btn.innerText = "Login / Sign Up";
    };

    // Auth State Observer
    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('userMenu').classList.remove('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userEmailDisp').innerText = "Logged in as: " + user.email;
            loadNovels();
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainSection').classList.add('hidden');
            document.getElementById('userMenu').classList.add('hidden');
        }
    });

    // Upload Novel
    window.uploadNovel = async () => {
        const title = document.getElementById('nTitle').value.trim();
        const ch = document.getElementById('nChNo').value;
        const content = document.getElementById('nContent').value;
        const file = document.getElementById('nCover').files[0];
        const btn = document.getElementById('publishBtn');
        const status = document.getElementById('uploadStatus');

        if(!title || !content || !ch) return alert("ခေါင်းစဉ်၊ အခန်းနံပါတ်နှင့် အကြောင်းအရာ ပြည့်စုံစွာဖြည့်ပါ");
        
        btn.disabled = true; status.innerText = "Uploading to Hazel Cloud...";

        try {
            let coverBase64 = "";
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 400;
                        const scale = maxW / img.width;
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        coverBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        await saveToFirestore(title, ch, content, coverBase64);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                await saveToFirestore(title, ch, content, "");
            }
        } catch(e) { 
            alert("Error: " + e.message); 
            btn.disabled = false; status.innerText = "";
        }
    };

    async function saveToFirestore(title, ch, content, cover) {
        try {
            const ref = doc(db, "novels", title);
            const snap = await getDoc(ref);
            const chapterEntry = { ch, content, timestamp: Date.now() };

            if(snap.exists()) {
                await updateDoc(ref, { 
                    chapters: arrayUnion(chapterEntry),
                    lastUpdate: Date.now()
                });
            } else {
                await setDoc(ref, {
                    title,
                    cover,
                    author: auth.currentUser.uid,
                    authorEmail: auth.currentUser.email,
                    chapters: [chapterEntry],
                    lastUpdate: Date.now()
                });
            }
            alert("အောင်မြင်စွာ တင်ပြီးပါပြီ!");
            location.reload();
        } catch(e) { 
            alert("Firestore Error: " + e.message); 
            document.getElementById('publishBtn').disabled = false;
        }
    }

    // Load Novels
    async function loadNovels() {
        try {
            const q = query(collection(db, "novels"), orderBy("lastUpdate", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('novelList');
            const myContainer = document.getElementById('myNovels');
            list.innerHTML = myContainer.innerHTML = "";

            snap.forEach(d => {
                const n = d.data();
                const itemHtml = `
                    <div class="novel-item">
                        <img src="${n.cover || 'https://via.placeholder.com/50x70?text=No+Cover'}" alt="cover">
                        <div>
                            <strong style="color:var(--accent)">${n.title}</strong><br>
                            <small style="color:#888;">Latest: Chapter ${n.chapters[n.chapters.length-1].ch}</small>
                        </div>
                    </div>`;
                list.innerHTML += itemHtml;
                if(n.author === auth.currentUser.uid) {
                    myContainer.innerHTML += itemHtml;
                }
            });
        } catch(e) { console.error(e); }
    }

    // UI Navigation
    window.switchTab = (t) => {
        document.getElementById('studioTab').classList.toggle('hidden', t !== 'studio');
        document.getElementById('settingTab').classList.toggle('hidden', t !== 'setting');
        document.getElementById('tabStudio').classList.toggle('active', t === 'studio');
        document.getElementById('tabSetting').classList.toggle('active', t === 'setting');
    };
    window.showAdmin = () => { 
        document.getElementById('profileSection').classList.add('hidden'); 
        document.getElementById('adminArea').classList.remove('hidden'); 
    };
    window.showProfile = () => { 
        document.getElementById('mainSection').classList.add('hidden'); 
        document.getElementById('adminArea').classList.add('hidden'); 
        document.getElementById('profileSection').classList.remove('hidden'); 
    };
    window.logout = () => signOut(auth).then(() => location.reload());

</script>
</body>
</html>
