<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazel - Webnovel</title>
    <style>
        :root { --accent: #e67e22; --bg: #121212; --card: #1e1e1e; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .brand { color: var(--accent); font-size: 28px; font-weight: bold; font-style: italic; text-align: center; margin: 15px 0; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; font-size: 16px; }
        .google-btn { background: white; color: #444; border: 1px solid #ddd; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
        .novel-item { display: flex; align-items: center; background: #252525; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
        .novel-item img { width: 60px; height: 80px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
        .back-key { background: none; border: none; color: var(--accent); font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">Hazel</div>

    <div id="authSection" class="card">
        <h3>Login / Sign Up</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password (အနည်းဆုံး ၆ လုံး)">
        <button class="submit-btn" onclick="window.authAction('login')">Login</button>
        
        <button class="google-btn" onclick="window.googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px; margin-right:10px;">
            Google ဖြင့်ဝင်ရန်
        </button>

        <button style="background:none; color:var(--accent); border:none; margin-top:15px; width:100%;" onclick="window.authAction('signup')">အကောင့်သစ်ဖွင့်ရန် (Sign Up)</button>
    </div>

    <div id="mainSection" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button id="addBtn" class="submit-btn" style="width: 70%;" onclick="showAdmin()">+ Novel တင်ရန်</button>
            <button onclick="window.logout()" style="background:#c0392b; color:white; border:none; padding:10px; border-radius:8px;">Logout</button>
        </div>
        <div class="card">
            <h3>Library (Cloud)</h3>
            <div id="libraryList">Loading novels...</div>
        </div>
    </div>

    <div id="adminArea" class="card hidden">
        <button class="back-key" onclick="goHome()">❮ Back</button>
        <h3>Novel အသစ်တင်မည်</h3>
        <input type="text" id="nTitle" placeholder="Novel အမည်">
        <input type="file" id="nCover" accept="image/*">
        <input type="number" id="nChNo" placeholder="အပိုင်း (နံပါတ်)">
        <textarea id="nContent" rows="8" placeholder="စာသားများ..."></textarea>
        <button class="submit-btn" onclick="window.uploadNovel()">Cloud ပေါ်သို့ တင်မည်</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBIt93W3hXXHu30cMFm47pXj9Dm0UG5IgA",
        authDomain: "hazelnovel-web.firebaseapp.com",
        projectId: "hazelnovel-web",
        storageBucket: "hazelnovel-web.firebasestorage.app",
        messagingSenderId: "516666865374",
        appId: "1:516666865374:web:e89a3906e27143cf53744f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Google Login
    window.googleLogin = () => {
        signInWithPopup(auth, provider)
            .then(() => goHome())
            .catch(e => alert("Google Login Error: " + e.message));
    };

    // Email Auth Actions
    window.authAction = (mode) => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Email နှင့် Password ဖြည့်ပါ");

        if(mode === 'login') {
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        } else {
            createUserWithEmailAndPassword(auth, email, pass).then(() => alert("အကောင့်ဖွင့်ပြီးပါပြီ!")).catch(e => alert(e.message));
        }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            loadLibrary();
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainSection').classList.add('hidden');
        }
    });

    // Cloud Upload
    window.uploadNovel = async () => {
        const title = document.getElementById('nTitle').value.trim();
        const ch = parseInt(document.getElementById('nChNo').value);
        const content = document.getElementById('nContent').value;
        const file = document.getElementById('nCover').files[0];

        if(!title || !ch || !content) return alert("အချက်အလက်စုံအောင် ဖြည့်ပါ");

        let coverBase64 = "";
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                coverBase64 = reader.result;
                await saveToCloud(title, ch, content, coverBase64);
            };
        } else {
            await saveToCloud(title, ch, content, "");
        }
    };

    async function saveToCloud(title, ch, content, cover) {
        try {
            const novelRef = doc(db, "novels", title);
            const docSnap = await getDoc(novelRef);
            if (docSnap.exists()) {
                await updateDoc(novelRef, { chapters: arrayUnion({ ch, content }) });
            } else {
                await setDoc(novelRef, { title, cover, chapters: [{ ch, content }] });
            }
            alert("အောင်မြင်စွာ တင်ပြီးပါပြီ!");
            goHome();
        } catch (e) { alert("Error: " + e.message); }
    }

    async function loadLibrary() {
        const querySnapshot = await getDocs(collection(db, "novels"));
        const list = document.getElementById('libraryList');
        list.innerHTML = "";
        if(querySnapshot.empty) list.innerHTML = "Novel များ မရှိသေးပါ။";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'novel-item';
            div.innerHTML = `<img src="${data.cover || 'https://via.placeholder.com/60x80'}"> <div><strong>${data.title}</strong></div>`;
            list.appendChild(div);
        });
    }

    window.showAdmin = () => {
        document.getElementById('mainSection').classList.add('hidden');
        document.getElementById('adminArea').classList.remove('hidden');
    };
    window.goHome = () => {
        document.getElementById('adminArea').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        loadLibrary();
    };

</script>
</body>
</html>
